<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="icon" href="./img/bikcraft.svg" type="image/SVG+XML">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <title>Bikcraft</title>
</head>

<body>
  <header class="header-principal bg-dark">
    <div class="header-container  container">

      <img src="./img/bikcraft.svg" alt="Logo bikcraft">
      <nav>
        <ul class="lista-navegacao font-primaria">
          <li><a class="font-1-m" href="#">Bicicletas</a></li>
          <li><a class="font-1-m" href="#">Seguros</a></li>
          <li><a class="font-1-m" href="#">Contato</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main class="bg-dark detalhe-shadow">
    <div class="container principal">
      <div class="principal-item">
        <h1 class="font-1-xxl font-primaria c-w mb-7">Bicicletas feitas
          sob medida <span class="detalhe-dot">.</span></h1>
        <p class="font-2-l c-5 font-secundaria mb-5 descricao-main">Bicicletas elétricas de alta precisão e qualidade, feitas sob medida para o cliente. Explore o mundo na sua velocidade com a Bikcraft.</p>
        <a class="uppercase btn-principal font-primaria" href="#">Selecione a sua</a>
      </div>
      <div class="imagem-main">
        <img src="./img/fotos/introducao.jpg" alt="Foto nimbus stark">
      </div>
    </div>
  </main>
</body>

</html>
